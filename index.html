<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nexus Chat V6 Final</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    display:flex;
    height:100vh;
}

/* LOGIN */
#login{
    position:absolute;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* SIDEBAR */
#sidebar{
    width:260px;
    background:#1a1a1a;
    padding:10px;
    overflow-y:auto;
}

.user{
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}
.user:hover{background:#333}

/* CHAT */
#chat{
    flex:1;
    display:flex;
    flex-direction:column;
}

#messages{
    flex:1;
    overflow:auto;
    padding:10px;
}

.msg{
    margin:5px;
    padding:10px;
    border-radius:10px;
    background:#222;
    max-width:60%;
}
.me{
    margin-left:auto;
    background:#00ffcc;
    color:black;
}

/* INPUT */
#inputArea{
    display:flex;
    padding:10px;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
}

button{
    margin-left:5px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#00ffcc;
    cursor:pointer;
}

/* CALL UI */
#callUI{
    position:absolute;
    bottom:20px;
    right:20px;
    background:#111;
    padding:15px;
    border-radius:10px;
    display:none;
}
</style>
</head>

<body>

<div id="login">
    <h2>Entrar</h2>
    <input id="username" placeholder="Seu nome">
    <button onclick="enter()">Entrar</button>
</div>

<div id="sidebar"></div>

<div id="chat">
    <div id="messages"></div>

    <div id="inputArea">
        <input id="msg" placeholder="Mensagem..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Enviar</button>
        <button onclick="callUser()">📞</button>
    </div>
</div>

<div id="callUI">
    <p id="callText">Ligação...</p>
    <button onclick="answerCall()">Atender</button>
    <button onclick="endCall()">Desligar</button>
    <button onclick="toggleMute()">Mute</button>
</div>

<audio id="remoteAudio" autoplay></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getDatabase, ref, push, set,
  onValue, onChildAdded
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const config = {
  apiKey:"AIzaSyB4ZlVza8XjPH9y3Z6Y-D0enYEZFhOO9m4",
  authDomain:"nexchat-21327.firebaseapp.com",
  databaseURL:"https://nexchat-21327-default-rtdb.firebaseio.com",
  projectId:"nexchat-21327"
};

const app = initializeApp(config);
const db = getDatabase(app);

let username;
let currentChat=null;

// LOGIN
window.enter=function(){
    username=document.getElementById("username").value;
    if(!username) return alert("Digite um nome");

    document.getElementById("login").style.display="none";

    set(ref(db,"users/"+username),true);

    loadUsers();
    loadMessages();
};

// USERS
function loadUsers(){
    onValue(ref(db,"users"),snap=>{
        const data=snap.val();
        const sidebar=document.getElementById("sidebar");
        sidebar.innerHTML="<b>Usuários</b>";

        for(let u in data){
            if(u===username) continue;

            const div=document.createElement("div");
            div.className="user";
            div.innerText=u;

            div.onclick=()=>{
                currentChat=u;
                document.getElementById("messages").innerHTML="";
            };

            sidebar.appendChild(div);
        }
    });
}

// MESSAGES
function loadMessages(){
    onChildAdded(ref(db,"messages"),snap=>{
        const d=snap.val();

        if(
            (d.user===username && d.to===currentChat) ||
            (d.user===currentChat && d.to===username)
        ){
            addMsg(d.user,d.text);
        }
    });
}

window.send=function(){
    if(!currentChat) return alert("Escolha um usuário");

    const text=document.getElementById("msg").value;

    push(ref(db,"messages"),{
        user:username,
        to:currentChat,
        text:text
    });

    addMsg(username,text);
    document.getElementById("msg").value="";
};

function addMsg(user,text){
    const div=document.createElement("div");
    div.className="msg";
    if(user===username) div.classList.add("me");

    div.innerHTML="<b>"+user+":</b> "+text;

    document.getElementById("messages").appendChild(div);
}

// ================= VOZ =================
let peer;
let localStream;
let muted=false;

// criar conexão
function createPeer(){
    const pc=new RTCPeerConnection({
        iceServers:[{urls:"stun:stun.l.google.com:19302"}]
    });

    pc.onicecandidate=e=>{
        if(e.candidate){
            push(ref(db,"calls/"+currentChat+"/ice"), e.candidate.toJSON());
        }
    };

    pc.ontrack=e=>{
        document.getElementById("remoteAudio").srcObject=e.streams[0];
    };

    return pc;
}

// LIGAR
window.callUser=async function(){
    if(!currentChat) return alert("Escolha alguém");

    document.getElementById("callUI").style.display="block";
    document.getElementById("callText").innerText="Chamando "+currentChat;

    localStream=await navigator.mediaDevices.getUserMedia({audio:true});
    peer=createPeer();

    localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));

    const offer=await peer.createOffer();
    await peer.setLocalDescription(offer);

    set(ref(db,"calls/"+currentChat),{
        from:username,
        offer
    });
};

// ATENDER
window.answerCall=async function(){
    localStream=await navigator.mediaDevices.getUserMedia({audio:true});
    peer=createPeer();

    localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));

    onValue(ref(db,"calls/"+username), async snap=>{
        const d=snap.val();
        if(!d?.offer) return;

        document.getElementById("callUI").style.display="block";
        document.getElementById("callText").innerText="Ligação de "+d.from;

        await peer.setRemoteDescription(new RTCSessionDescription(d.offer));

        const answer=await peer.createAnswer();
        await peer.setLocalDescription(answer);

        set(ref(db,"calls/"+username),{...d,answer});
    });
};

// RECEBER ANSWER
onValue(ref(db,"calls"), async snap=>{
    const data=snap.val();
    if(!peer) return;

    for(let k in data){
        if(data[k].answer){
            await peer.setRemoteDescription(new RTCSessionDescription(data[k].answer));
        }
    }
});

// DESLIGAR
window.endCall=function(){
    if(peer) peer.close();
    document.getElementById("callUI").style.display="none";
};

// MUTE
window.toggleMute=function(){
    muted=!muted;
    if(localStream){
        localStream.getAudioTracks()[0].enabled=!muted;
    }
};
</script>

</body>
</html>
