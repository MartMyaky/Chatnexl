<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nexus V8 Supremo</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#0f0f1a,#1a1a2e);
    color:white;
}

/* GRID */
.app{
    display:grid;
    grid-template-columns:260px 1fr 300px;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    background:#141428;
    padding:15px;
    overflow:auto;
}

.user{
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}
.user:hover{background:#222}

/* CHAT */
.chat{
    display:flex;
    flex-direction:column;
}

.header{
    padding:15px;
    border-bottom:1px solid #333;
    display:flex;
    justify-content:space-between;
}

#messages{
    flex:1;
    overflow:auto;
    padding:15px;
}

.msg{
    max-width:60%;
    padding:10px;
    margin:6px;
    border-radius:12px;
    background:#222;
}
.me{
    margin-left:auto;
    background:#7b2cff;
}

/* INPUT */
.input{
    display:flex;
    padding:10px;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
}

button{
    margin-left:5px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#7b2cff;
    color:white;
}

/* VIDEO */
#videoArea{
    position:absolute;
    bottom:20px;
    right:20px;
    display:none;
    flex-direction:column;
}

video{
    width:200px;
    border-radius:10px;
    margin:5px;
}
</style>
</head>

<body>

<div class="app">

<!-- USERS -->
<div class="sidebar">
    <h3>Usuários</h3>
    <div id="users"></div>
</div>

<!-- CHAT -->
<div class="chat">

<div class="header">
    <span id="chatName">Selecione alguém</span>
    <div>
        <button onclick="startVoice()">📞</button>
        <button onclick="startVideo()">🎥</button>
    </div>
</div>

<div id="messages"></div>

<div class="input">
    <input id="msg" placeholder="Mensagem..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">Enviar</button>
</div>

</div>

<!-- DETAILS -->
<div class="sidebar">
    <h3>Detalhes</h3>
    <p id="userInfo"></p>
</div>

</div>

<!-- VIDEO -->
<div id="videoArea">
    <video id="localVideo" autoplay muted></video>
    <video id="remoteVideo" autoplay></video>
    <button onclick="endCall()">Desligar</button>
</div>

<audio id="remoteAudio" autoplay></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase, ref, push, set,
onValue, onChildAdded
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const config={
 apiKey:"SUA_KEY",
 databaseURL:"SUA_DB"
};

const app=initializeApp(config);
const db=getDatabase(app);

let username="user"+Math.floor(Math.random()*9999);
let currentChat=null;

set(ref(db,"users/"+username),true);

// USERS
onValue(ref(db,"users"),snap=>{
    const data=snap.val();
    const div=document.getElementById("users");
    div.innerHTML="";

    for(let u in data){
        if(u===username) continue;

        const el=document.createElement("div");
        el.className="user";
        el.innerText="🟢 "+u;

        el.onclick=()=>{
            currentChat=u;
            document.getElementById("chatName").innerText=u;
            document.getElementById("messages").innerHTML="";
        };

        div.appendChild(el);
    }
});

// MESSAGES
onChildAdded(ref(db,"messages"),snap=>{
    const d=snap.val();

    if(
        (d.user===username && d.to===currentChat) ||
        (d.user===currentChat && d.to===username)
    ){
        addMsg(d.user,d.text);
    }
});

window.send=function(){
    const text=document.getElementById("msg").value;

    push(ref(db,"messages"),{
        user:username,
        to:currentChat,
        text
    });

    addMsg(username,text);
    document.getElementById("msg").value="";
};

function addMsg(user,text){
    const div=document.createElement("div");
    div.className="msg";
    if(user===username) div.classList.add("me");

    div.innerText=text;
    document.getElementById("messages").appendChild(div);
}

// ===== WEBRTC =====
let peer;
let localStream;

function createPeer(){
    const pc=new RTCPeerConnection({
        iceServers:[{urls:"stun:stun.l.google.com:19302"}]
    });

    pc.ontrack=e=>{
        document.getElementById("remoteVideo").srcObject=e.streams[0];
        document.getElementById("remoteAudio").srcObject=e.streams[0];
    };

    pc.onicecandidate=e=>{
        if(e.candidate){
            push(ref(db,"calls/"+currentChat+"/ice"),e.candidate.toJSON());
        }
    };

    return pc;
}

// VOICE
window.startVoice=async function(){
    localStream=await navigator.mediaDevices.getUserMedia({audio:true});
    startCall();
};

// VIDEO
window.startVideo=async function(){
    localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    document.getElementById("videoArea").style.display="flex";
    document.getElementById("localVideo").srcObject=localStream;
    startCall();
};

async function startCall(){
    peer=createPeer();

    localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));

    const offer=await peer.createOffer();
    await peer.setLocalDescription(offer);

    set(ref(db,"calls/"+currentChat),{
        from:username,
        offer
    });
}

// RECEBER
onValue(ref(db,"calls/"+username),async snap=>{
    const d=snap.val();
    if(!d?.offer) return;

    localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    document.getElementById("videoArea").style.display="flex";
    document.getElementById("localVideo").srcObject=localStream;

    peer=createPeer();

    localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));

    await peer.setRemoteDescription(new RTCSessionDescription(d.offer));

    const answer=await peer.createAnswer();
    await peer.setLocalDescription(answer);

    set(ref(db,"calls/"+username),{...d,answer});
});

// ANSWER
onValue(ref(db,"calls"),async snap=>{
    const data=snap.val();
    if(!peer) return;

    for(let k in data){
        if(data[k].answer){
            await peer.setRemoteDescription(new RTCSessionDescription(data[k].answer));
        }
    }
});

// END
window.endCall=function(){
    if(peer) peer.close();
    document.getElementById("videoArea").style.display="none";
};
</script>

</body>
</html>
