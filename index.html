<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nexus Chat V3</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    display:flex;
    height:100vh;
}

/* LOGIN */
#login {
    position:absolute;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* CHAT */
#chat {
    flex:1;
    display:flex;
    flex-direction:column;
}

#messages {
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.msg {
    margin:5px;
    padding:10px;
    border-radius:10px;
    background:#222;
}

.me {
    background:#00ffcc;
    color:black;
    text-align:right;
}

#inputArea {
    display:flex;
}

input {
    flex:1;
    padding:10px;
    border:none;
}

button {
    padding:10px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
    margin:2px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>Entrar no Nexus Chat</h2>
    <input id="username" placeholder="Seu nome">
    <button onclick="enter()">Entrar</button>
</div>

<!-- CHAT -->
<div id="chat">
    <div id="messages"></div>

    <div id="inputArea">
        <input id="msg" placeholder="Digite..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Enviar</button>
        <button onclick="startCall()">📞 Ligar</button>
        <button onclick="answerCall()">🎤 Atender</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4ZlVza8XjPH9y3Z6Y-D0enYEZFhOO9m4",
  authDomain: "nexchat-21327.firebaseapp.com",
  databaseURL: "https://nexchat-21327-default-rtdb.firebaseio.com",
  projectId: "nexchat-21327",
  storageBucket: "nexchat-21327.firebasestorage.app",
  messagingSenderId: "749692779757",
  appId: "1:749692779757:web:bbf8e65ceb994e9471a0e4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let username;

// ===== CHAT =====
window.enter = function() {
    username = document.getElementById("username").value;
    if(!username) return alert("Digite um nome");

    document.getElementById("login").style.display="none";

    const messagesRef = ref(db, "messages");

    onChildAdded(messagesRef, (snap) => {
        const data = snap.val();

        const div = document.createElement("div");
        div.className = "msg";

        if(data.user === username) div.classList.add("me");

        div.innerHTML = "<b>" + data.user + ":</b> " + data.text;

        document.getElementById("messages").appendChild(div);
        document.getElementById("messages").scrollTop = 999999;
    });
};

window.send = function() {
    const text = document.getElementById("msg").value;
    if(!text) return;

    push(ref(db, "messages"), {
        user: username,
        text: text
    });

    document.getElementById("msg").value="";
};

// ===== VOZ (WEBRTC) =====
let localStream;
let peer;
const callRef = ref(db, "call");

function createPeer() {
    return new RTCPeerConnection({
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    });
}

// iniciar chamada
window.startCall = async function() {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    peer = createPeer();

    localStream.getTracks().forEach(track => peer.addTrack(track, localStream));

    peer.ontrack = (event) => {
        const audio = new Audio();
        audio.srcObject = event.streams[0];
        audio.play();
    };

    peer.onicecandidate = (event) => {
        if (event.candidate) {
            set(callRef, { candidate: event.candidate });
        }
    };

    const offer = await peer.createOffer();
    await peer.setLocalDescription(offer);

    set(callRef, { offer });
};

// atender chamada
window.answerCall = async function() {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    peer = createPeer();

    localStream.getTracks().forEach(track => peer.addTrack(track, localStream));

    peer.ontrack = (event) => {
        const audio = new Audio();
        audio.srcObject = event.streams[0];
        audio.play();
    };

    onValue(callRef, async (snap) => {
        const data = snap.val();
        if (!data) return;

        if (data.offer) {
            await peer.setRemoteDescription(new RTCSessionDescription(data.offer));

            const answer = await peer.createAnswer();
            await peer.setLocalDescription(answer);

            set(callRef, { ...data, answer });
        }

        if (data.candidate) {
            try {
                await peer.addIceCandidate(new RTCIceCandidate(data.candidate));
            } catch {}
        }
    });
};

// receber resposta
onValue(callRef, async (snap) => {
    const data = snap.val();
    if (!data) return;

    if (data.answer && peer && !peer.currentRemoteDescription) {
        await peer.setRemoteDescription(new RTCSessionDescription(data.answer));
    }
});
</script>

</body>
</html>
