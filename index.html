<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nexus Chat V8</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#0f0f1a,#1a1a2e);
    color:white;
}

/* GRID */
.app{
    display:grid;
    grid-template-columns:260px 1fr 300px;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    background:#141428;
    padding:15px;
    overflow:auto;
}

.user{
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}
.user:hover{background:#222}

/* CHAT */
.chat{
    display:flex;
    flex-direction:column;
}

.header{
    padding:15px;
    border-bottom:1px solid #333;
}

#messages{
    flex:1;
    overflow:auto;
    padding:15px;
}

.msg{
    max-width:60%;
    padding:10px;
    margin:6px;
    border-radius:12px;
    background:#222;
}
.me{
    margin-left:auto;
    background:#7b2cff;
}

/* INPUT */
.input{
    display:flex;
    padding:10px;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
}

button{
    margin-left:5px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#7b2cff;
    color:white;
}

/* MOBILE */
@media(max-width:900px){
    .app{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="app">

<!-- USERS -->
<div class="sidebar">
    <h3>Usuários</h3>
    <div id="users"></div>
</div>

<!-- CHAT -->
<div class="chat">

<div class="header">
    <span id="chatName">Selecione alguém</span>
</div>

<div id="messages"></div>

<div class="input">
    <input id="msg" placeholder="Mensagem..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">Enviar</button>
</div>

</div>

<!-- DETAILS -->
<div class="sidebar">
    <h3>Detalhes</h3>
    <p id="userInfo"></p>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase, ref, push, set,
onValue, onChildAdded, onDisconnect
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 CONFIG REAL (já pronto)
const config = {
  apiKey: "AIzaSyB4ZlVza8XjPH9y3Z6Y-D0enYEZFhOO9m4",
  authDomain: "nexchat-21327.firebaseapp.com",
  databaseURL: "https://nexchat-21327-default-rtdb.firebaseio.com",
  projectId: "nexchat-21327"
};

const app = initializeApp(config);
const db = getDatabase(app);

// 👤 LOGIN
let username = prompt("Digite seu nome");

if(!username){
    username = "user" + Math.floor(Math.random()*9999);
}

// 📡 PRESENÇA ONLINE (CORRIGIDO)
const userRef = ref(db, "users/" + username);

set(userRef, true);
onDisconnect(userRef).remove();

let currentChat = null;

// 👥 USUÁRIOS ONLINE
onValue(ref(db,"users"), snap=>{
    const data = snap.val();
    const div = document.getElementById("users");

    div.innerHTML = "";

    if(!data) return;

    for(let u in data){
        if(u === username) continue;

        const el = document.createElement("div");
        el.className = "user";
        el.innerText = "🟢 " + u;

        el.onclick = ()=>{
            currentChat = u;
            document.getElementById("chatName").innerText = u;
            document.getElementById("messages").innerHTML = "";
            document.getElementById("userInfo").innerText = "Conversando com " + u;
        };

        div.appendChild(el);
    }
});

// 💬 MENSAGENS
onChildAdded(ref(db,"messages"), snap=>{
    const d = snap.val();

    if(
        (d.user === username && d.to === currentChat) ||
        (d.user === currentChat && d.to === username)
    ){
        addMsg(d.user, d.text);
    }
});

// ✉️ ENVIAR
window.send = function(){
    if(!currentChat) return alert("Escolha alguém");

    const text = document.getElementById("msg").value;

    if(!text) return;

    push(ref(db,"messages"),{
        user: username,
        to: currentChat,
        text
    });

    addMsg(username, text);
    document.getElementById("msg").value = "";
};

// UI
function addMsg(user,text){
    const div = document.createElement("div");
    div.className = "msg";

    if(user === username) div.classList.add("me");

    div.innerText = text;

    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop = 999999;
}
</script>

</body>
</html>
