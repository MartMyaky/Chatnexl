<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Final</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0f0f1a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:250px;
background:#141428;
padding:10px;
overflow:auto;
}

.user{
padding:10px;
margin:5px 0;
border-radius:10px;
cursor:pointer;
}
.user:hover{background:#222}

/* CHAT */
.chat{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
background:#222;
padding:10px;
margin:5px;
border-radius:10px;
max-width:70%;
}

.me{
margin-left:auto;
background:#7b2cff;
}

img{max-width:200px;border-radius:10px}

/* INPUT */
.input{
display:flex;
padding:10px;
gap:5px;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#7b2cff;
color:white;
}
</style>
</head>

<body>

<div class="sidebar">
<h3>Usuários</h3>
<div id="users"></div>
</div>

<div class="chat">
<div id="messages"></div>

<div class="input">
<input id="msg" placeholder="Mensagem..." onkeypress="if(event.key==='Enter') send()">
<input type="file" id="file">
<button onclick="send()">Enviar</button>
<button onclick="askAI()">🤖</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getDatabase, ref, push, set,
onValue, onDisconnect
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 CONFIG (já com seu projeto)
const config = {
apiKey: "AIzaSyB4ZlVza8XjPH9y3Z6Y-D0enYEZFhOO9m4",
databaseURL: "https://nexchat-21327-default-rtdb.firebaseio.com"
};

const app = initializeApp(config);
const db = getDatabase(app);

// LOGIN
let username = prompt("Seu nome:");
if(!username) username="user"+Math.floor(Math.random()*9999);

// ONLINE
const userRef = ref(db,"users/"+username);
set(userRef,true);
onDisconnect(userRef).remove();

let currentUser=null;

// LISTA DE USUÁRIOS
onValue(ref(db,"users"), snap=>{
const data = snap.val();
users.innerHTML="";

for(let u in data){
if(u===username) continue;

const div=document.createElement("div");
div.className="user";
div.innerText="🟢 "+u;

div.onclick=()=>{
currentUser=u;
};

users.appendChild(div);
}
});

// CHAT ID
function chatId(a,b){
return [a,b].sort().join("_");
}

// CARREGAR MENSAGENS
function loadMessages(){
if(!currentUser) return;

const id = chatId(username,currentUser);

onValue(ref(db,"chats/"+id), snap=>{
const data = snap.val();
messages.innerHTML="";

if(!data) return;

Object.values(data)
.sort((a,b)=>a.time-b.time)
.forEach(m=>{
const div=document.createElement("div");
div.className="msg";

if(m.from===username) div.classList.add("me");

if(m.image){
div.innerHTML=`<img src="${m.image}">`;
}else{
div.innerText=m.from+": "+m.text;
}

messages.appendChild(div);
});

messages.scrollTop=999999;
});
}

// ENVIAR
window.send=function(){
if(!currentUser) return alert("Escolha um usuário");

const text=msg.value;
const file=fileInput.files[0];

const id=chatId(username,currentUser);

// IMAGEM (BASE64)
if(file){
const reader=new FileReader();

reader.onload=function(){
push(ref(db,"chats/"+id),{
from:username,
image:reader.result,
time:Date.now()
});
};

reader.readAsDataURL(file);
}

// TEXTO
if(text){
push(ref(db,"chats/"+id),{
from:username,
text:text,
time:Date.now()
});
}

msg.value="";
fileInput.value="";

loadMessages();
};

// IA SIMPLES
window.askAI=function(){
const text=msg.value;

push(ref(db,"chats/"+chatId(username,currentUser)),{
from:"IA",
text:"Resposta IA: "+text,
time:Date.now()
});
};
</script>

</body>
</html>
