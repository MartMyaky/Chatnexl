<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nexus Chat V2</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    display:flex;
    height:100vh;
}

/* LOGIN */
#login {
    position:absolute;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* SIDEBAR */
#sidebar {
    width:250px;
    background:#1a1a1a;
    padding:10px;
    overflow-y:auto;
}

/* CHAT */
#chat {
    flex:1;
    display:flex;
    flex-direction:column;
}

#messages {
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.msg {
    margin:5px;
    padding:10px;
    border-radius:10px;
    background:#222;
}

.me {
    background:#00ffcc;
    color:black;
    text-align:right;
}

#inputArea {
    display:flex;
}

input {
    flex:1;
    padding:10px;
    border:none;
}

button {
    padding:10px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>Entrar no Nexus Chat</h2>
    <input id="username" placeholder="Seu nome">
    <button onclick="enter()">Entrar</button>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
    <b>Chat Global</b>
</div>

<!-- CHAT -->
<div id="chat">
    <div id="messages"></div>
    <div id="inputArea">
        <input id="msg" placeholder="Digite..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Enviar</button>
    </div>
</div>

<!-- FIREBASE + CHAT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4ZlVza8XjPH9y3Z6Y-D0enYEZFhOO9m4",
  authDomain: "nexchat-21327.firebaseapp.com",
  databaseURL: "https://nexchat-21327-default-rtdb.firebaseio.com",
  projectId: "nexchat-21327",
  storageBucket: "nexchat-21327.firebasestorage.app",
  messagingSenderId: "749692779757",
  appId: "1:749692779757:web:bbf8e65ceb994e9471a0e4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let username;

// entrar no chat
window.enter = function() {
    username = document.getElementById("username").value;

    if(!username) return alert("Digite um nome");

    document.getElementById("login").style.display="none";

    const messagesRef = ref(db, "messages");

    onChildAdded(messagesRef, (snap) => {
        const data = snap.val();

        const div = document.createElement("div");
        div.className = "msg";

        if(data.user === username) div.classList.add("me");

        div.innerHTML = "<b>" + data.user + ":</b> " + data.text;

        document.getElementById("messages").appendChild(div);

        // auto scroll
        document.getElementById("messages").scrollTop = 999999;
    });
};

// enviar mensagem
window.send = function() {
    const text = document.getElementById("msg").value;

    if(!text) return;

    push(ref(db, "messages"), {
        user: username,
        text: text
    });

    document.getElementById("msg").value="";
};
</script>

</body>
</html>
